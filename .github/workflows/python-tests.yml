name: Offline Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  offline-tests:
    name: Run offline unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Run tests with coverage
        run: |
          uv run --extra dev pytest -k 'not transmit_method and not receive_method'

